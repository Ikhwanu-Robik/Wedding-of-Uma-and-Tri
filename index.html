<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation Gallery</title>
    <link rel="icon" href="heart-icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
        font-family: "Cormorant Garamond", serif;
        color: #f5e6c8;
      }

      .countdown-wrapper {
        height: 100svh;
        padding: 5rem 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transform: translateY(-50px) scale(0.95);
        transition: all 0.8s ease;
      }

      .countdown-wrapper.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .title {
        font-family: "Playfair Display", serif;
        font-size: 36px;
        margin-bottom: 20px;
        letter-spacing: 2px;
      }

      .subtitle {
        font-size: 18px;
        margin-bottom: 40px;
        opacity: 0.8;
      }

      .countdown {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
      }

      .time-box {
        background: rgba(255, 215, 160, 0.05);
        border: 1px solid rgba(255, 215, 160, 0.2);
        border-radius: 16px;
        padding: 15px 15px;
        text-align: center;
        width: 20%;

        /* subtle gold glow */
        box-shadow: 0 0 20px rgba(255, 215, 160, 0.1);
      }

      .time {
        font-size: 32px;
        font-family: "Playfair Display", serif;
      }

      .label {
        font-size: 14px;
        letter-spacing: 1px;
        opacity: 0.7;
      }
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        width: 100svw;
        height: 100svh;
        display: flex;
        flex-direction: column;
        overflow-y: scroll;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }

      img {
        width: 100%;
        height: auto;
        opacity: 0;
        transform: translateY(-50px) scale(0.95);
        transition: all 0.8s ease;
      }

      /* Active state when visible */
      img.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      #heart-icon {
        position: absolute;
        bottom: 17svh;
        align-self: center;

        width: 100px;
        height: 100px;
        fill: #888;
        cursor: pointer;
        transition: all 0.3s ease;
        filter: drop-shadow(0 0 6px #888) drop-shadow(0 0 12px #888);

        transform-origin: center;
        animation: heartbeat 1.2s infinite;
      }

      #heart-icon:hover {
        fill: #330808;
        filter: drop-shadow(0 0 6px #330808) drop-shadow(0 0 12px #330808);
      }

      @keyframes heartbeat {
        0% {
          transform: scale(1);
        }
        14% {
          transform: scale(1.25);
        }
        28% {
          transform: scale(1);
        }
        42% {
          transform: scale(1.25);
        }
        70% {
          transform: scale(1);
        }
        100% {
          transform: scale(1);
        }
      }

      #countdown {
        font-size: 28px;
        font-weight: bold;
        text-align: center;
        margin-top: 20px;
      }

      .map-wrapper {
        padding: 4rem 0;
        width: 100%;
        display: flex;
        gap: 1rem;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      a {
        font-family: "Cormorant Garamond", serif;
        color: #f5e6c8;
      }

      a:active {
        font-family: "Cormorant Garamond", serif;
        color: #ffffff;
      }

      .now-playing {
        position: fixed;
        bottom: -80px;
        left: 50%;
        transform: translateX(-50%);
        background: #111;
        color: #fff;
        padding: 12px 20px;
        border-radius: 12px;
        font-size: 14px;
        opacity: 0;
        transition: all 0.4s ease;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      }

      .now-playing.show {
        bottom: 20px;
        opacity: 1;
      }

      .img-non-cover {
        display: none;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <img
      src="Our wedding party invitation_page-0001.jpg"
      alt=""
      class="sections"
    />
    <img
      src="Our wedding party invitation_page-0002.jpg"
      alt=""
      class="img-non-cover sections"
    />
    <img
      src="Our wedding party invitation_page-0003.jpg"
      alt=""
      class="img-non-cover sections"
    />
    <img
      src="Our wedding party invitation_page-0004.jpg"
      alt=""
      class="img-non-cover sections"
    />

    <div class="countdown-wrapper sections img-non-cover">
      <div class="title">The Wedding</div>
      <div class="subtitle">Counting the moments until our special day</div>

      <div class="countdown">
        <div class="time-box">
          <div id="days" class="time">0</div>
          <div class="label">Days</div>
        </div>
        <div class="time-box">
          <div id="hours" class="time">0</div>
          <div class="label">Hours</div>
        </div>
        <div class="time-box">
          <div id="minutes" class="time">0</div>
          <div class="label">Minutes</div>
        </div>
        <div class="time-box">
          <div id="seconds" class="time">0</div>
          <div class="label">Seconds</div>
        </div>
      </div>
    </div>

    <div class="sections img-non-cover map-wrapper">
      <div class="title">Location</div>
      <iframe
        src="https://maps.google.com/maps?q=-7.6270475,111.5338534&z=15&output=embed"
        width="90%"
        height="400px"
        frameborder="5"
        style="border: 0; height: 400px; min-height: 400px"
        allowfullscreen
      ></iframe>
      <a
        href="https://www.google.com/maps/place/La+Diva+Persewaan+Baju+Tari/@-7.6270475,111.5338534,17z/data=!3m1!4b1!4m6!3m5!1s0x2e79bef1cf68f291:0x75c463bb06c0b074!8m2!3d-7.6270475!4d111.5338534!16s%2Fg%2F11f37sjw6s?entry=ttu&g_ep=EgoyMDI2MDMxOC4xIKXMDSoASAFQAw%3D%3D"
        id="maps-link"
        >Open in Maps</a
      >
    </div>

    <svg
      id="heart-icon"
      class="w-6 h-6 text-gray-800 dark:text-white"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      fill="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        d="m12.75 20.66 6.184-7.098c2.677-2.884 2.559-6.506.754-8.705-.898-1.095-2.206-1.816-3.72-1.855-1.293-.034-2.652.43-3.963 1.442-1.315-1.012-2.678-1.476-3.973-1.442-1.515.04-2.825.76-3.724 1.855-1.806 2.201-1.915 5.823.772 8.706l6.183 7.097c.19.216.46.34.743.34a.985.985 0 0 0 .743-.34Z"
      />
    </svg>

    <audio
      id="heartSound"
      src="Elvis Presley - Can't Help Falling In Love With You Instrumental.mp3"
      loop
    ></audio>

    <div id="nowPlaying" class="now-playing"></div>

    <script>
      const sections = document.querySelectorAll(".sections");

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("show");
            }
          });
        },
        {
          threshold: 0.3,
        }
      );

      sections.forEach((section) => observer.observe(section));

      document.getElementById("heart-icon").addEventListener("click", () => {
        document.getElementById("heartSound").play();

        showNowPlaying("Elvis Presley - Can't Help Falling In Love With You");

        setTimeout(() => {
          let nonCoverImgs = document.querySelectorAll(".img-non-cover");

          nonCoverImgs.forEach((elm) => {
            elm.classList.remove("img-non-cover");
          });

          document.getElementById("heart-icon").classList.add("hidden");
        }, 1000);
      });

      function showNowPlaying(title) {
        document.getElementById("nowPlaying").innerHTML =
          "Now Playing : <br/>" + title;
        document.getElementById("nowPlaying").classList.add("show");

        setTimeout(() => {
          document.getElementById("nowPlaying").classList.remove("show");
        }, 3000);
      }
    </script>

    <script>
      const targetDate = new Date("2026-03-30T00:00:00");

      function updateCountdown() {
        const now = new Date();
        const diff = targetDate - now;

        if (diff <= 0) return;

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("days").textContent = days;
        document.getElementById("hours").textContent = hours;
        document.getElementById("minutes").textContent = minutes;
        document.getElementById("seconds").textContent = seconds;
      }

      setInterval(updateCountdown, 1000);
      updateCountdown();
    </script>
  </body>
</html>
